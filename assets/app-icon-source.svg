<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Emoji Learning Flashcard Game for Kids icon">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#20b8bc" />
      <stop offset="55%" stop-color="#6bd8d8" />
      <stop offset="100%" stop-color="#ffe06b" />
    </linearGradient>
    <linearGradient id="cardWarm" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff6d8" />
      <stop offset="100%" stop-color="#ffd68a" />
    </linearGradient>
    <linearGradient id="cardCool" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecf8ff" />
      <stop offset="100%" stop-color="#c7e5ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#11415a" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)" />

  <circle cx="228" cy="212" r="92" fill="#ffffff" opacity="0.16" />
  <circle cx="812" cy="212" r="76" fill="#ffffff" opacity="0.18" />
  <circle cx="836" cy="822" r="96" fill="#ffffff" opacity="0.14" />

  <g filter="url(#shadow)">
    <rect x="172" y="270" width="276" height="468" rx="56" fill="url(#cardWarm)" transform="rotate(-12 310 504)" />
    <rect x="576" y="270" width="276" height="468" rx="56" fill="url(#cardCool)" transform="rotate(12 714 504)" />
    <rect x="324" y="208" width="376" height="560" rx="64" fill="#fffdf8" />
  </g>

  <g>
    <rect x="364" y="278" width="296" height="210" rx="44" fill="#ffffff" stroke="#dce7f0" stroke-width="12" />
    <rect x="394" y="314" width="104" height="140" rx="32" fill="#f97316" />
    <rect x="520" y="314" width="104" height="140" rx="32" fill="#3b82f6" />
    <circle cx="446" cy="384" r="20" fill="#ffffff" opacity="0.9" />
    <circle cx="572" cy="384" r="20" fill="#ffffff" opacity="0.9" />
  </g>

  <g>
    <rect x="366" y="536" width="292" height="164" rx="38" fill="#17324d" opacity="0.96" />
    <text x="512" y="604" text-anchor="middle" font-family="Avenir Next, Nunito, Arial, sans-serif" font-size="66" font-weight="800" fill="#ffffff">Emoji</text>
    <text x="512" y="658" text-anchor="middle" font-family="Avenir Next, Nunito, Arial, sans-serif" font-size="34" font-weight="700" fill="#9fe8e8">Flashcards</text>
  </g>

  <g>
    <circle cx="258" cy="664" r="54" fill="#ffffff" opacity="0.95" />
    <text x="258" y="685" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif" font-size="64">📚</text>
    <circle cx="766" cy="664" r="54" fill="#ffffff" opacity="0.95" />
    <text x="766" y="685" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif" font-size="64">👕</text>
  </g>
